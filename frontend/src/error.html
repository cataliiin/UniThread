<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Error | UniThread</title>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body class="flex min-h-screen items-center justify-center bg-slate-50 p-5 font-sans text-slate-800">
		<div class="max-w-md text-center">
			<div class="mx-auto mb-8 h-44 w-44">
				<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full">
					<circle cx="100" cy="100" r="80" fill="#FEE2E2" />
					<circle cx="70" cy="90" r="15" fill="#EF4444" opacity="0.8" />
					<circle cx="130" cy="90" r="15" fill="#EF4444" opacity="0.8" />
					<path d="M60 120 Q100 100 140 120" stroke="#DC2626" stroke-width="4" stroke-linecap="round" fill="none" />
					<path d="M50 70 L60 80 M150 70 L140 80" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" />
					<circle cx="55" cy="65" r="4" fill="#7C3AED" />
					<circle cx="145" cy="65" r="4" fill="#7C3AED" />
				</svg>
			</div>
			<div class="mb-2 text-7xl font-bold text-indigo-600 max-sm:text-6xl">500</div>
			<h1 class="mb-4 text-2xl font-bold text-slate-900 max-sm:text-xl">Server Error</h1>
			<p class="mb-8 leading-relaxed text-slate-600">Something went wrong on our end. We are working to fix the issue as soon as possible.</p>
			<div class="flex flex-wrap justify-center gap-3">
				<a href="/" class="rounded-lg bg-indigo-600 px-6 py-3 font-medium text-white transition-all duration-200 hover:bg-indigo-700">Back Home</a>
				<button onclick="location.reload()" class="rounded-lg border-2 border-slate-300 px-6 py-3 font-medium text-slate-700 transition-all duration-200 hover:border-slate-400 hover:bg-slate-50">Try Again</button>
			</div>
		</div>
	</body>
</html>
